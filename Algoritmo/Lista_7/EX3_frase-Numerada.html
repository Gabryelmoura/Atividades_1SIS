<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frase Numerada</title>
</head>

<body>
    <h2>Diga algo sobre a matéria de Algoritmos: </h2>
    <input type="text" id="ipt_Frase">
    <button onclick="diga()">Enviar</button>
    <div id="msg_Res"></div>
</body>
</html>

<script>
    function diga(){
        let frase = ipt_Frase.value;
        let contador = 0;

        while(contador < 7){
            contador = contador + 1;

            msg_Res.innerHTML += `${contador}.${frase}<br>`;
        }
    }
</script>
