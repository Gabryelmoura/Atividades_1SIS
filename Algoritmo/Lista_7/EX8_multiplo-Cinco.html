<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplos de 5</title>
</head>

<body>
    <h2>Informe um numero: </h2>
    <input type="text" id="ipt_Numero">

    <button onclick="multiplo()">Adoro múltiplos de 5</button>
    <div id="msg_Res"></div>
</body>
</html>

<script>
    function multiplo(){
        let cont = 0;
        let num = Number(ipt_Numero.value);

        if(num > 20 && num < 100){
            while(cont < num){
                cont += 1;

                if(cont%5 == 0){
                    msg_Res.innerHTML += `${cont}<br>`;
                }
            }
        }

        else{
            alert("Informe um numero entre 20 e 100.");
        }
        
    }
</script>
