<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <button onclick="pares()">S2 Pares</button>
    <div id="msg_Res"></div>
</body>
</html>

<script>
    function pares(){
        let cont = 0;

        while(cont < 100){
            cont += 1;

            if(cont%2 > 0){
                msg_Res.innerHTML += `${cont}<br>`;
            }
        }
    }
</script>
