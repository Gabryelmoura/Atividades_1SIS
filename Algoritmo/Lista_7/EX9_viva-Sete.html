<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viva o 7</title>
</head>

<body>
    <h2>Informe um Numero: </h2>
    <input type="text" id="ipt_Numero">
    
    <button onclick="multi()">Viva o 7!</button>
    <div id="msg_Res"></div>
</body>
</html>

<script>
    function multi(){
        let cont = 0;
        let num = Number(ipt_Numero.value);

        if(num > 0 && num < 200){
            while(cont < num){
                cont += 1;

                if(cont%7 == 0){
                    msg_Res.innerHTML += `${cont}<br>`;
                }   
            }
        }

        else{
            alert("Informe um valor entre 0 e 200");
        }
    }
</script>
