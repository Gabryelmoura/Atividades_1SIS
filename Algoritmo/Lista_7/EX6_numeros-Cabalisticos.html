<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtro de Numeros Cabalisticos</title>
</head>

<body>
    <button onclick="filtrar()">Filtrar números Cabalísticos</button>
    <div id="msg_Res"></div>
</body>
</html>

<script>
    function filtrar(){
        let cont = 0;

        while(cont < 30){
            cont += 1;

            if(cont != 3 && cont != 4 && cont != 7 && cont != 10 && cont != 12){
                msg_Res.innerHTML += `${cont}<br>`;
            }
        }
    }
</script>
