<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contagem Simples</title>
</head>

<body>
    <button onclick="contar()">Contar</button>
    <div id="msg_Res"></div>
</body>
</html>

<script>
    function contar(){
        let contador = 0;

        while(contador < 15){
            contador = contador + 1;

            msg_Res.innerHTML += `${contador}<br>`;
        }
    }
</script>
